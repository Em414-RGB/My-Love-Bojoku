<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ILYSM my Bear❤️❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    #startScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .box {
      position: relative;
      z-index: 2;
      margin-top: 120px;
    }

    button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
  background: pink;
  color: black;

  box-shadow: 0 0 10px pink;
}

button:hover {
  box-shadow: 0 0 20px hotpink, 0 0 40px hotpink;
}

    .heart {
      position: absolute;
      color: pink;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh); opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
    body.end {
  filter: blur(2px) brightness(0.7);
}
  </style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>Sebelum mulai tolong klik ini dulu ya 😍</h2>
  <button onclick="startApp()">Klik aku 😆</button>
</div>

<audio id="bgm" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="box">
  <h1 id="question"></h1>
  <div id="answers"></div>
</div>

<script>
const sounds = [
  new Audio("suara1.mp3"),
  new Audio("suara2.mp3"),
  new Audio("suara3.mp3"),
  new Audio("suara4.mp3")
];

let soundIndex = 0;
let current = 0;
let shrink = 1;

const qEl = document.getElementById("question");
const ansEl = document.getElementById("answers");

function startApp() {
  document.getElementById("startScreen").style.display = "none";

  const bgm = document.getElementById("bgm");
  bgm.volume = 0.7;
  bgm.play();

  sounds.forEach(s => s.load());

  render();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 200);

const flow = [
  {
    q: "Kamu sayang aku nggak maa? 🥺💖",
    a: [
      { text: "Sayang banget 😍", next: 1 },
      { text: "Enggak 😜", action: "run" }
    ]
  },
  {
    q: "Aku lucu nggak sih? 😆💕",
    a: [
      { text: "Lucu banget 😆💖", next: 2 },
      { text: "B aja 😏", action: "run" }
    ]
  },
  {
    q: "Kamu gak kangen aku nih ma? 😚",
    a: [
      { text: "Kangen parah 🥺❤️", next: 3 },
      { text: "Biasa aja 😐", action: "run" }
    ]
  },
  {
    q: "can we be forever ma? 🥹❤️",
    a: [
      { text: "Forever 💍❤️", next: "end" },
      { text: "Nanti dulu 😜", action: "run" }
    ]
  }
];

function moveButton(btn) {
  sounds[soundIndex].currentTime = 0;
  sounds[soundIndex].play();

  soundIndex++;
  if (soundIndex >= sounds.length) {
    soundIndex = sounds.length - 1;
  }

  shrink -= 0.1;
  if (shrink < 0.4) shrink = 0.4;
  btn.style.transform = "scale(" + shrink + ")";

  btn.style.position = "absolute";
  btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}
let typingInterval; // tambahin ini

function typeText(text) {
  clearInterval(typingInterval); // biar gak numpuk

  qEl.textContent = "";
  let i = 0;

  typingInterval = setInterval(() => {
    qEl.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(typingInterval);
  }, 40);
}
function render() {
  const data = flow[current];
  typeText(data.q);
  ansEl.innerHTML = "";

  data.a.forEach((btnData) => {
    const btn = document.createElement("button");
    btn.innerText = btnData.text;

    btn.onclick = () => {
      if (btnData.next !== undefined) {
        if (btnData.next === "end") {
          document.body.classList.add("end");
          
          typeText("Mwehe i knew it that 😆❤️");
          ansEl.innerHTML = "💖💖💖";

          let confettiInterval = setInterval(createConfetti, 200);

          setTimeout(() => {
            clearInterval(confettiInterval);
          }, 5000);
        } else {
          current = btnData.next;
          soundIndex = 0;
          shrink = 1;
          render();
        }
      }
    };

    if (btnData.action === "run") {
      btn.onmouseover = () => moveButton(btn);
      btn.ontouchstart = (e) => {
        e.preventDefault();
        moveButton(btn);
      };
    }

    ansEl.appendChild(btn);
  });
}
  function createConfetti() {
  const confetti = document.createElement("div");
  confetti.innerHTML = "💖";
  confetti.style.position = "absolute";
  confetti.style.left = Math.random() * 100 + "vw";
  confetti.style.top = "-10px";
  confetti.style.fontSize = Math.random() * 20 + 10 + "px";

  document.body.appendChild(confetti);

  let fall = setInterval(() => {
    confetti.style.top = parseInt(confetti.style.top) + 5 + "px";
    if (parseInt(confetti.style.top) > window.innerHeight) {
      clearInterval(fall);
      confetti.remove();
    }
  }, 30);
}
</script>

</body>
</html>
